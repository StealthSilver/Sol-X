<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        try {
          var raw = localStorage.getItem("sol-x-preferences");
          if (!raw) return;
          var data = JSON.parse(raw);
          var theme = data && data.state && data.state.theme;
          var root = document.documentElement;
          if (theme === "light") root.classList.remove("dark");
          else if (theme === "dark") root.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Primary Meta Tags -->
    <title>
      Sol-X - Project Monitoring for Renewable Energy Infrastructure
    </title>
    <meta
      name="title"
      content="Sol-X - Project Monitoring for Renewable Energy Infrastructure"
    />
    <meta
      name="description"
      content="Sol-X is the project monitoring platform built for renewable energy infrastructure. Track milestones, manage delays, and capture real evidence from concept to commissioning."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Sol-X - Project Monitoring for Renewable Energy Infrastructure"
    />
    <meta
      property="og:description"
      content="Track milestones, manage delays, and capture real evidence from concept to commissioning with Sol-X."
    />
    <meta property="og:image" content="/solx-logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="Sol-X - Project Monitoring for Renewable Energy Infrastructure"
    />
    <meta
      property="twitter:description"
      content="Track milestones, manage delays, and capture real evidence from concept to commissioning with Sol-X."
    />
    <meta property="twitter:image" content="/solx-logo.svg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0F0F0F" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
